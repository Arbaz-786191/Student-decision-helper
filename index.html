<!DOCTYPE html>
<html>
<head>
  <title>Login</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(to right, #0f0f0f, #1c1c1c);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      display: flex;
      width: 800px;
      height: 400px;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 0 20px rgba(0,0,0,0.6);
    }

    /* LEFT SIDE */
    .left {
      width: 50%;
      background: linear-gradient(to bottom, #1c1c1c, #2a2a2a);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .left img {
      width: 150px;
      margin-bottom: 19px;
    }

    .left h1 {
      color: yellow;
      text-align: center;
      font-size: 32px;
      text-shadow: 0 0 10px yellow;
    }

    /* RIGHT SIDE */
    .right {
      width: 50%;
      background: black;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .right h2 {
      color: red;
      margin-bottom: 20px;
    }

    input {
      width: 70%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 6px;
      border: none;
      background: #2a2a2a;
      color: white;
    }

    button {
      width: 75%;
      padding: 10px;
      background: red;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background: darkred;
    }

    .links {
      margin-top: 10px;
      color: white;
      font-size: 12px;
    }

    .links span {
      cursor: pointer;
      color: #ccc;
    }

    .links span:hover {
      color: white;
    }

    #error {
      color: red;
      font-size: 12px;
    }
  </style>

</head>

<body>

<div class="container">

  <!-- LEFT -->
  <div class="left">
    <img src="https://cdn-icons-gif.flaticon.com/15557/15557327.gif" class="book">
    <h1>Student<br>Decision<br>Helper</h1>
  </div>

  <!-- RIGHT -->
  <div class="right">
    <h2>Login</h2>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">Login</button>

    <p id="error"></p>

    <div class="links">
      <span onclick="register()">Register</span> | 
      <span onclick="forgot()">Forgot Password?</span>
    </div>
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
