<!DOCTYPE html>
<html>
<head>
  <title>Success</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(to right, #0f0f0f, #1c1c1c);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: #1f1f1f;
      padding: 40px;
      border-radius: 12px;
      width: 400px;
      text-align: center;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    h1 {
      color: red;
    }

    p {
      margin: 10px 0;
    }

    .btn {
      margin-top: 20px;
      padding: 10px 20px;
      background: red;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .btn:hover {
      background: darkred;
    }
  </style>

</head>

<body>

<div class="box">

  <h1>✅ Successfully Submitted</h1>

  <div id="data"></div>

  <button class="btn" onclick="goBack()">Go Back</button>

</div>

<script>
let data = JSON.parse(localStorage.getItem("studentData"));

if(data){
  document.getElementById("data").innerHTML = `
    <p><b>Name:</b> ${data.name}</p>
    <p><b>Age:</b> ${data.age}</p>
    <p><b>Study:</b> ${data.study}</p>
    <p><b>Interest:</b> ${data.interest}</p>
    <p><b>Career:</b> ${data.career}</p>

  `;
}

function goBack(){
  window.location.href = "dashboard.html";
}
</script>

</body>
</html>
